<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" fill="none">
  <!-- Upper diamond (lighter dark gray) -->
  <g transform="translate(62, 60) rotate(45)">
    <rect x="0" y="0" width="68" height="68" fill="#5a5a5a"/>
    <!-- brushed texture overlay -->
    <rect x="0" y="0" width="68" height="68" fill="url(#brushed)" opacity="0.3"/>
  </g>
  <!-- Lower diamond (darker, offset) -->
  <g transform="translate(34, 84) rotate(45)">
    <rect x="0" y="0" width="68" height="68" fill="#2e2e2e"/>
  </g>

  <!-- Gradient for brushed effect -->
  <defs>
    <linearGradient id="brushed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- HOLZKNECHT text -->
  <text x="158" y="108" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="600" letter-spacing="4" fill="#4a4a4a">HOLZKNECHT</text>

  <!-- Horizontal separator line -->
  <line x1="158" y1="120" x2="488" y2="120" stroke="#7a7a7a" stroke-width="1"/>

  <!-- Natursteine text -->
  <text x="160" y="148" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="30" font-weight="300" letter-spacing="8" fill="#6a6a6a">Natursteine</text>
</svg>
